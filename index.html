<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neue Kontakte 😊</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  width:90%;
  max-width:420px;
  background:#1e293b;
  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.avatar {
  width:80px;
  height:80px;
  border-radius:50%;
  margin:auto;
  display:block;
  border:3px solid #22c55e;
}

.badge {
  text-align:center;
  margin-top:10px;
  font-size:12px;
  color:#22c55e;
}

h2 {
  text-align:center;
  margin:10px 0;
}

.chat-preview {
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin:15px 0;
  font-size:13px;
}

.bubble {
  background:#334155;
  padding:8px 10px;
  border-radius:8px;
  margin:5px 0;
}

.cta {
  display:block;
  text-align:center;
  padding:14px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  border-radius:12px;
  text-decoration:none;
  color:#022c22;
  font-weight:bold;
  transition:0.2s;
}

.cta:hover {
  transform:scale(1.03);
}

.small {
  font-size:11px;
  text-align:center;
  margin-top:10px;
  color:#94a3b8;
}

.loader {
  height:4px;
  width:100%;
  background:#334155;
  border-radius:10px;
  overflow:hidden;
  margin:10px 0;
}

.loader span {
  display:block;
  height:100%;
  width:40%;
  background:#22c55e;
  animation:load 2s infinite;
}

@keyframes load {
  0% {margin-left:-40%;}
  100% {margin-left:100%;}
}
</style>
</head>

<body>

<div class="card">

<img src="https://via.placeholder.com/100" class="avatar">

<div class="badge">● Online</div>

<h2>Hey 😊</h2>

<p style="text-align:center;font-size:14px;">
Ich bin gerade online und offen für neue Gespräche.
</p>

<div class="chat-preview">
  <div class="bubble">Hey, suchst du auch neue Kontakte?</div>
  <div class="bubble">Ich antworte dort schneller 😊</div>
</div>

<div class="loader"><span></span></div>

<a href="https://cdsecure-dt.com/?a=67814&c=385842&co=97474&mt=22&s1=JEMBUET" class="cta">
Jetzt weiter →
</a>

<div class="small">
Externer Link – freiwillig & transparent
</div>

</div>

</body>
</html>
